name: CI Pipeline

permissions: {}

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/devops-cicd-lab
  VIRTUAL_ENV: ${{ github.workspace }}/app/.venv

jobs:
  # ── Job 1: Build & Cache ──────────────────────────────────
  build:
    name: Build & Cache
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python 3.12
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "app/uv.lock"

      - name: Install all dependencies
        working-directory: app
        run: uv sync --all-extras

      - name: Upload app source as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-source
          path: app/
          retention-days: 1

  # ── Job 2: Lint (parallel) ────────────────────────────────
  lint:
    name: Lint (ruff)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python 3.12
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "app/uv.lock"

      - name: Install dependencies
        working-directory: app
        run: uv sync --all-extras

      - name: Run ruff linter
        working-directory: app
        run: uv run ruff check src/ tests/

      - name: Run ruff format check
        working-directory: app
        run: uv run ruff format --check src/ tests/

  # ── Job 3: Test (parallel, matrix) ───────────────────────
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "app/uv.lock"

      - name: Install dependencies
        working-directory: app
        run: uv sync --all-extras

      - name: Run pytest with coverage
        working-directory: app
        env:
          PYTHONPATH: .
        run: |
          uv run pytest tests/ -v \
            --tb=short \
            --junitxml=test-results-${{ matrix.python-version }}.xml \
            --cov=src \
            --cov-report=xml:coverage-${{ matrix.python-version }}.xml \
            --cov-report=term-missing

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            app/test-results-${{ matrix.python-version }}.xml
            app/coverage-${{ matrix.python-version }}.xml
          retention-days: 7

  # ── Job 4: Security Scan (parallel) ──────────────────────
  security-scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python 3.12
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Export prod deps and run pip-audit
        working-directory: app
        run: |
          uv export --no-dev --format requirements-txt > /tmp/prod-req.txt
          uv tool install pip-audit
          uv tool run pip-audit -r /tmp/prod-req.txt || true

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "app/"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

  # ── Job 5: Quality Gate (Fan-In) ─────────────────────────
  quality-gate:
    name: Quality Gate
    needs: [lint, test, security-scan]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: All checks passed
        run: |
          echo "✅ Quality Gate passed!"
          echo "   ✔ Lint:          OK"
          echo "   ✔ Tests (3.12):  OK"
          echo "   ✔ Tests (3.13):  OK"
          echo "   ✔ Security Scan: OK"
          echo "📦 Ready to build Docker image."

  # ── Job 6: Docker Build & Push ───────────────────────────
  docker-build:
    name: Docker Build & Push (ghcr.io)
    needs: quality-gate
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (SHA tag, not :latest)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: app/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image info
        run: |
          echo "🐳 Image pushed:"
          echo "${{ steps.meta.outputs.tags }}"
